{% extends "base.html" %}
{% block title %}Log In — StudioOps{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-8">
      <h1 class="text-2xl font-semibold text-stone-800 mb-1">Welcome back</h1>
      <p class="text-sm text-stone-500 mb-7">Log in to your StudioOps account</p>

      <div id="login-form-container">
        {% include "auth/_login_form.html" %}
      </div>

      <p class="mt-6 text-center text-sm text-stone-500">
        Don't have an account?
        <a href="{{ url_for('auth.register') }}" class="text-brand-600 font-medium hover:underline">Sign up</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
