{% extends "base.html" %}
{% block title %}My Schedule — StudioOps{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-4 py-8">

  <!-- Page header -->
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div>
      <h1 class="text-3xl font-bold text-slate-800">My Schedule</h1>
      <p class="text-sm text-slate-500 mt-0.5">{{ week_label }}</p>
    </div>
    <div class="flex items-center gap-2">
      <button
        hx-get="/staff/schedule?week_start={{ prev_week }}"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-push-url="true"
        class="inline-flex items-center gap-1 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors focus:outline-none focus:ring-2 focus:ring-teal-400">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
        Prev
      </button>
      <button
        hx-get="/staff/schedule?week_start={{ week_start }}"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        class="px-3 py-2 text-sm font-medium text-teal-700 bg-teal-50 border border-teal-200 rounded-lg hover:bg-teal-100 transition-colors focus:outline-none focus:ring-2 focus:ring-teal-400">
        This Week
      </button>
      <button
        hx-get="/staff/schedule?week_start={{ next_week }}"
        hx-target="#schedule-content"
        hx-swap="innerHTML"
        hx-push-url="true"
        class="inline-flex items-center gap-1 px-3 py-2 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors focus:outline-none focus:ring-2 focus:ring-teal-400">
        Next
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Schedule content (swapped by HTMX on week navigation) -->
  <div id="schedule-content">
    {% include "partials/staff/schedule_list.html" %}
  </div>

</div>
{% endblock %}
