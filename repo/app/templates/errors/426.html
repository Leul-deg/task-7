{% extends "base.html" %}
{% block title %}Upgrade Required — StudioOps{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-16">
  <div class="bg-white border border-amber-200 rounded-2xl shadow-sm p-8 text-center">
    <h1 class="text-2xl font-semibold text-stone-800 mb-3">Upgrade Required</h1>
    <p class="text-sm text-stone-600 mb-4">{{ message }}</p>
    <p class="text-xs text-stone-400 mb-6">
      Client version: {{ client_version }} · Required version: {{ expected_version }}
    </p>
    <button
      type="button"
      onclick="window.location.reload()"
      class="inline-flex items-center justify-center px-4 py-2 rounded-lg bg-brand-600 text-white text-sm font-medium hover:bg-brand-700 transition-colors"
    >
      Refresh Now
    </button>
  </div>
</div>
{% endblock %}
