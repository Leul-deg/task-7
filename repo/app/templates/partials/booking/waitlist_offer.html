<div class="text-center py-2 space-y-2">
  <p class="text-sm text-amber-700 font-medium">This session is full.</p>
  <button
    hx-post="/booking/waitlist"
    hx-vals='{"session_id": "{{ session_id }}"}'
    hx-target="#session-action-{{ session.id }}"
    hx-swap="innerHTML"
    class="w-full py-2 px-4 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-medium transition-colors focus:outline-none focus:ring-2 focus:ring-amber-400 focus:ring-offset-1">
    Join Waitlist
  </button>
</div>
