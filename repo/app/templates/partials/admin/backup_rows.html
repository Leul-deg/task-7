{% if flash_msg %}
<tr>
  <td colspan="6" class="px-4 py-3">
    <div class="rounded-lg bg-sky-50 border border-sky-200 px-4 py-2 text-sm text-sky-800">
      {{ flash_msg }}
    </div>
  </td>
</tr>
{% endif %}
{% for b in backups %}
<tr class="hover:bg-stone-50 transition-colors">
  <td class="px-4 py-3 text-stone-400 text-xs font-mono">#{{ b.id }}</td>
  <td class="px-4 py-3">
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium
      {% if b.backup_type == 'database' %}bg-brand-100 text-brand-700
      {% else %}bg-violet-100 text-violet-700{% endif %}">
      {{ b.backup_type }}
    </span>
  </td>
  <td class="px-4 py-3 text-stone-600 text-sm">{{ b.file_size_human }}</td>
  <td class="px-4 py-3">
    <span class="inline-block px-2 py-0.5 rounded-full text-xs font-semibold
      {% if b.status == 'completed' %}bg-emerald-100 text-emerald-700
      {% elif b.status == 'failed' %}bg-red-100 text-red-700
      {% else %}bg-amber-100 text-amber-700{% endif %}">
      {{ b.status }}
    </span>
  </td>
  <td class="px-4 py-3 text-stone-400 text-xs whitespace-nowrap">{{ b.created_at }}</td>
  <td class="px-4 py-3 text-right">
    {% if b.status == 'completed' and b.backup_type == 'database' %}
    <form hx-post="{{ url_for('admin.restore_backup', backup_id=b.id) }}"
          hx-target="#restore-result"
          hx-swap="innerHTML"
          class="inline">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
      <input type="hidden" name="promote" value="0" />
      <button type="submit"
              class="text-xs text-stone-500 hover:text-brand-700 transition-colors">
        Mark Restore
      </button>
    </form>
    {% else %}
    <span class="text-xs text-stone-300">—</span>
    {% endif %}
  </td>
</tr>
{% else %}
<tr>
  <td colspan="6" class="px-4 py-10 text-center text-stone-400 text-sm">No backups found.</td>
</tr>
{% endfor %}
