{% for e in errors %}
<tr class="hover:bg-stone-50 transition-colors">
  <td class="px-4 py-3">
    <span class="inline-block px-2 py-0.5 rounded text-xs font-semibold
      {% if e.level == 'CRITICAL' %}bg-red-200 text-red-800
      {% else %}bg-red-100 text-red-700{% endif %}">
      {{ e.level }}
    </span>
  </td>
  <td class="px-4 py-3 text-stone-500 text-xs">{{ e.source }}</td>
  <td class="px-4 py-3 text-stone-600 font-mono text-xs truncate max-w-[160px]">
    {% if e.method %}{{ e.method }} {% endif %}{{ e.endpoint or '—' }}
  </td>
  <td class="px-4 py-3 text-stone-700 text-xs max-w-xs truncate" title="{{ e.message }}">
    {{ e.message }}
  </td>
  <td class="px-4 py-3 text-stone-500 text-xs">{{ e.user_id or '—' }}</td>
  <td class="px-4 py-3 text-stone-400 text-xs whitespace-nowrap">{{ e.date }}</td>
</tr>
{% else %}
<tr>
  <td colspan="6" class="px-4 py-10 text-center text-stone-400 text-sm">No errors found.</td>
</tr>
{% endfor %}
