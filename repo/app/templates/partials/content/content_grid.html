{% if items %}
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
  {% for item in items %}
    {% include "partials/content/content_card.html" %}
  {% endfor %}
</div>

{% if has_next %}
<div class="mt-8 flex justify-center">
  <button
    class="px-6 py-2.5 text-sm font-medium bg-white border border-stone-200 text-stone-600 rounded-xl hover:border-brand-400 hover:text-brand-700 transition-colors shadow-sm"
    hx-get="{{ url_for('content.browse') }}?page={{ page + 1 }}"
    hx-target="#content-grid"
    hx-swap="beforeend"
    hx-include=".content-filter"
  >
    Load More
  </button>
</div>
{% endif %}

{% else %}
<div class="flex flex-col items-center justify-center py-20 text-center">
  <div class="w-16 h-16 bg-stone-100 rounded-full flex items-center justify-center mb-4">
    <svg class="w-8 h-8 text-stone-400" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
    </svg>
  </div>
  <p class="text-stone-500 font-medium">No content found</p>
  <p class="text-sm text-stone-400 mt-1">Try adjusting your filters.</p>
</div>
{% endif %}
