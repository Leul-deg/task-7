<tr id="filter-{{ f.id }}" class="hover:bg-stone-50 transition-colors">
  <!-- Pattern -->
  <td class="px-5 py-3 font-mono text-xs text-stone-800 max-w-xs truncate">{{ f.pattern }}</td>

  <!-- Type -->
  <td class="px-4 py-3">
    <span class="text-xs font-medium px-2 py-0.5 rounded-full capitalize
      {% if f.filter_type == 'keyword' %}bg-blue-50 text-blue-700{% else %}bg-violet-50 text-violet-700{% endif %}">
      {{ f.filter_type }}
    </span>
  </td>

  <!-- Active toggle -->
  <td class="px-4 py-3">
    <button
      hx-post="{{ url_for('content.toggle_filter', filter_id=f.id) }}"
      hx-target="#filter-{{ f.id }}"
      hx-swap="outerHTML"
      class="relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none
             {% if f.is_active %}bg-brand-600{% else %}bg-stone-200{% endif %}"
      role="switch" aria-checked="{{ 'true' if f.is_active else 'false' }}"
      title="{{ 'Deactivate' if f.is_active else 'Activate' }}">
      <span class="inline-block h-3 w-3 rounded-full bg-white shadow transform transition-transform
                   {% if f.is_active %}translate-x-5{% else %}translate-x-1{% endif %}"></span>
    </button>
  </td>

  <!-- Created date -->
  <td class="px-4 py-3 text-xs text-stone-400 whitespace-nowrap">
    {{ f.created_at.strftime('%m/%d/%Y') if f.created_at else '—' }}
  </td>

  <!-- Delete -->
  <td class="px-4 py-3 text-right">
    <button
      hx-delete="{{ url_for('content.delete_filter', filter_id=f.id) }}"
      hx-target="#filter-{{ f.id }}"
      hx-swap="outerHTML"
      hx-confirm="Delete this filter? This cannot be undone."
      class="text-xs font-medium text-red-500 hover:text-red-700 transition-colors px-2 py-1 rounded-lg border border-transparent hover:border-red-200 hover:bg-red-50">
      Delete
    </button>
  </td>
</tr>
