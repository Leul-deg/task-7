<tr id="resource-row-{{ resource.id }}" class="hover:bg-slate-50 transition-colors">
  <td class="px-4 py-3 font-medium text-slate-800">{{ resource.name }}</td>
  <td class="px-4 py-3">
    <span class="text-xs font-medium px-2 py-0.5 rounded-full capitalize
      {% if resource.type == 'room' %}text-teal-700 bg-teal-50 border border-teal-100
      {% elif resource.type == 'equipment' %}text-blue-700 bg-blue-50 border border-blue-100
      {% else %}text-purple-700 bg-purple-50 border border-purple-100{% endif %}">
      {{ resource.type }}
    </span>
  </td>
  <td class="px-4 py-3 text-slate-600 text-sm">{{ resource.capacity }}</td>
  <td class="px-4 py-3 text-slate-500 text-sm">{{ resource.description or '—' }}</td>
  <td class="px-4 py-3">
    {% if resource.is_active %}
    <span class="text-xs font-medium text-emerald-700 bg-emerald-50 border border-emerald-200 px-2 py-0.5 rounded-full">Active</span>
    {% else %}
    <span class="text-xs font-medium text-slate-400 bg-slate-100 border border-slate-200 px-2 py-0.5 rounded-full">Inactive</span>
    {% endif %}
  </td>
  <td class="px-4 py-3">
    <button
      hx-post="/staff/resources/{{ resource.id }}/toggle"
      hx-target="#resource-row-{{ resource.id }}"
      hx-swap="outerHTML"
      class="px-2.5 py-1 text-xs font-medium rounded-lg border transition-colors focus:outline-none
        {% if resource.is_active %}
          text-amber-700 bg-amber-50 border-amber-200 hover:bg-amber-100
        {% else %}
          text-emerald-700 bg-emerald-50 border-emerald-200 hover:bg-emerald-100
        {% endif %}">
      {% if resource.is_active %}Deactivate{% else %}Activate{% endif %}
    </button>
  </td>
</tr>
