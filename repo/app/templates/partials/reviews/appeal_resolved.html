{% if decision == 'upheld' %}
<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4">
  <div class="flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="text-emerald-600 font-bold text-sm">Dispute Upheld</span>
      <span class="text-xs px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700 border border-emerald-200 font-medium">upheld</span>
    </div>
    <span class="text-xs text-emerald-600">Review removed · -5 pts applied to reviewer</span>
  </div>
  {% if resolution_text %}
  <p class="text-xs text-emerald-700 mt-2">{{ resolution_text }}</p>
  {% endif %}
</div>
{% else %}
<div class="bg-slate-50 border border-slate-200 rounded-xl p-4">
  <div class="flex items-center justify-between gap-3 flex-wrap">
    <div class="flex items-center gap-2">
      <span class="text-slate-600 font-bold text-sm">Dispute Rejected</span>
      <span class="text-xs px-2 py-0.5 rounded-full bg-slate-100 text-slate-600 border border-slate-200 font-medium">rejected</span>
    </div>
    <span class="text-xs text-slate-500">Review remains active</span>
  </div>
  {% if resolution_text %}
  <p class="text-xs text-slate-500 mt-2">{{ resolution_text }}</p>
  {% endif %}
</div>
{% endif %}
