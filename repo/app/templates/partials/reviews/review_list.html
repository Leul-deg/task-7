{% if reviews %}
<div class="space-y-4">
  {% for review in reviews %}
    {% include "partials/reviews/review_card.html" %}
  {% endfor %}
</div>
{% else %}
<div class="flex flex-col items-center justify-center py-16 text-center">
  <div class="w-14 h-14 bg-stone-100 rounded-full flex items-center justify-center mb-4">
    <span class="text-2xl text-stone-300">★</span>
  </div>
  <p class="text-stone-500 font-medium">No reviews yet</p>
  <p class="text-sm text-stone-400 mt-1">Be the first to leave a review!</p>
</div>
{% endif %}
