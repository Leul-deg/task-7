version: "3.9"

services:
  web:
    build: .
    env_file: .env.example
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - studioops_db:/data/db
      - studioops_uploads:/data/uploads
      - studioops_backups:/data/backups
      - studioops_logs:/data/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  studioops_db:
  studioops_uploads:
  studioops_backups:
  studioops_logs:
